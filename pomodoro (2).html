<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOCO — Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #161625;
  --border: rgba(255,255,255,0.06);
  --text: #e8e6f0;
  --muted: #555570;
  --accent: #c8f135;
  --accent2: #7b61ff;
  --red: #ff4d6d;
  --green: #c8f135;
  --blue: #61b8ff;
  --r: 130; /* ring radius */
}

html, body {
  height: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
}

/* Background grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* Ambient glow */
.glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  transition: background 1.2s ease;
}
.glow-1 {
  top: -200px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(200,241,53,0.04) 0%, transparent 70%);
}
.glow-2 {
  bottom: -250px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(123,97,255,0.05) 0%, transparent 70%);
}

.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  width: 100%;
  max-width: 420px;
}

/* Header */
.header {
  text-align: center;
  animation: fadeUp 0.5s ease both;
}
.header h1 {
  font-size: 13px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

/* Mode tabs */
.modes {
  display: flex;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 5px;
  animation: fadeUp 0.5s 0.1s ease both;
}

.mode-btn {
  padding: 8px 18px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn:hover { color: var(--text); }
.mode-btn.active {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

/* Ring */
.ring-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeUp 0.5s 0.2s ease both;
}

.ring-svg {
  transform: rotate(-90deg);
  filter: drop-shadow(0 0 20px rgba(200, 241, 53, 0.15));
  transition: filter 1s ease;
}

.ring-track {
  fill: none;
  stroke: var(--surface2);
  stroke-width: 3;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
}

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: 58px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1;
  transition: color 0.3s;
}

.timer-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 16px;
  animation: fadeUp 0.5s 0.3s ease both;
}

.btn-secondary {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-secondary:hover {
  border-color: rgba(255,255,255,0.15);
  color: var(--text);
  transform: scale(1.05);
}
.btn-secondary:active { transform: scale(0.95); }

.btn-main {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #080810;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 0 30px rgba(200,241,53,0.2);
}
.btn-main:hover {
  transform: scale(1.06);
  box-shadow: 0 0 40px rgba(200,241,53,0.35);
}
.btn-main:active { transform: scale(0.96); }
.btn-main.running {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  box-shadow: none;
}
.btn-main.running:hover {
  border-color: rgba(255,255,255,0.2);
  box-shadow: none;
}

/* Sessions */
.sessions {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  animation: fadeUp 0.5s 0.4s ease both;
}

.sessions-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}

.dots {
  display: flex;
  gap: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--muted);
  background: transparent;
  transition: all 0.3s;
}
.dot.filled {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(200,241,53,0.5);
}

/* Stats row */
.stats {
  display: flex;
  gap: 12px;
  width: 100%;
  animation: fadeUp 0.5s 0.5s ease both;
}

.stat-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
}

.stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}

.stat-key {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Shortcuts hint */
.hint {
  font-size: 11px;
  color: #333350;
  letter-spacing: 0.05em;
  animation: fadeUp 0.5s 0.6s ease both;
}
.hint span {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  margin: 0 2px;
  font-family: 'DM Mono', monospace;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 100;
  white-space: nowrap;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .timer-display { font-size: 44px; }
  .ring-svg { width: 280px; height: 280px; }
}
</style>
</head>
<body>

<div class="glow glow-1" id="glow1"></div>
<div class="glow glow-2" id="glow2"></div>

<div class="app">

  <div class="header">
    <h1>Pomodoro · Foco</h1>
  </div>

  <div class="modes" id="modeBar">
    <button class="mode-btn active" data-mode="focus" data-time="25">Foco</button>
    <button class="mode-btn" data-mode="short" data-time="5">Pausa</button>
    <button class="mode-btn" data-mode="long" data-time="15">Pausa Longa</button>
  </div>

  <div class="ring-wrap">
    <svg class="ring-svg" id="ringSvg" width="300" height="300" viewBox="0 0 300 300">
      <circle class="ring-track" cx="150" cy="150" r="130"/>
      <circle class="ring-progress" id="ringProgress" cx="150" cy="150" r="130"/>
    </svg>
    <div class="ring-center">
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">FOCO</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="btnReset" title="Resetar (R)">↺</button>
    <button class="btn-main" id="btnPlay">▶</button>
    <button class="btn-secondary" id="btnSkip" title="Pular (S)">⏭</button>
  </div>

  <div class="sessions">
    <div class="sessions-label">Sessões hoje</div>
    <div class="dots" id="dots">
      <div class="dot" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="statSessions">0</div>
      <div class="stat-key">Sessões</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statMinutes">0</div>
      <div class="stat-key">Min. Focado</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-key">Sequência</div>
    </div>
  </div>

  <div class="hint">
    <span>Espaço</span> play/pause &nbsp;
    <span>R</span> reset &nbsp;
    <span>S</span> pular &nbsp;
    <button onclick="playSound('done')" style="background:transparent;border:1px solid #333350;border-radius:4px;color:#555570;font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;cursor:pointer;margin-left:4px;" onmouseover="this.style.color='#c8f135';this.style.borderColor='#c8f135'" onmouseout="this.style.color='#555570';this.style.borderColor='#333350'">🔊 testar som</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIGURAÇÃO ──────────────────────────────────────
const MODES = {
  focus: { label: 'FOCO',        minutes: 25, color: '#c8f135', glow: 'rgba(200,241,53,0.06)'  },
  short: { label: 'PAUSA',       minutes: 5,  color: '#61b8ff', glow: 'rgba(97,184,255,0.06)'  },
  long:  { label: 'PAUSA LONGA', minutes: 15, color: '#7b61ff', glow: 'rgba(123,97,255,0.07)' },
}

// ── STATE ─────────────────────────────────────────────
let mode       = 'focus'
let totalSecs  = 25 * 60
let remaining  = totalSecs
let running    = false
let interval   = null
let sessions   = 0
let minutesFocused = 0
let streak     = 0

// ── DOM REFS ──────────────────────────────────────────
const display    = document.getElementById('timerDisplay')
const label      = document.getElementById('timerLabel')
const btnPlay    = document.getElementById('btnPlay')
const btnReset   = document.getElementById('btnReset')
const btnSkip    = document.getElementById('btnSkip')
const progress   = document.getElementById('ringProgress')
const modeBar    = document.getElementById('modeBar')
const dots       = document.querySelectorAll('.dot')
const statSess   = document.getElementById('statSessions')
const statMin    = document.getElementById('statMinutes')
const statStr    = document.getElementById('statStreak')
const toast      = document.getElementById('toast')
const glow1      = document.getElementById('glow1')

// ── RING SETUP ────────────────────────────────────────
const R          = 130
const CIRCUMF    = 2 * Math.PI * R
progress.style.strokeDasharray  = CIRCUMF
progress.style.strokeDashoffset = 0

function setRing(ratio) {
  // ratio 1 = cheio, 0 = vazio
  progress.style.strokeDashoffset = CIRCUMF * (1 - ratio)
}

// ── DISPLAY ───────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2,'0')
  const sec = (s % 60).toString().padStart(2,'0')
  return `${m}:${sec}`
}

function updateDisplay() {
  display.textContent = formatTime(remaining)
  setRing(remaining / totalSecs)
}

// ── MODE ──────────────────────────────────────────────
function setMode(m) {
  if (running) stop()
  mode      = m
  const cfg = MODES[m]
  totalSecs = cfg.minutes * 60
  remaining = totalSecs

  // update label
  label.textContent = cfg.label

  // update ring color
  progress.style.stroke = cfg.color
  document.querySelector('.ring-svg').style.filter =
    `drop-shadow(0 0 20px ${cfg.color}33)`

  // update glow
  glow1.style.background =
    `radial-gradient(circle, ${cfg.glow} 0%, transparent 70%)`

  // update btn color
  btnPlay.style.background = running ? '' : cfg.color

  // update mode buttons
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m)
  })

  updateDisplay()
  btnPlay.textContent = '▶'
  btnPlay.classList.remove('running')
  btnPlay.style.background = cfg.color
  btnPlay.style.color = '#080810'
}

// ── PLAY / PAUSE ──────────────────────────────────────
function play() {
  running = true
  btnPlay.textContent = '⏸'
  btnPlay.classList.add('running')
  btnPlay.style.background = ''
  btnPlay.style.color = ''

  interval = setInterval(() => {
    remaining--
    updateDisplay()

    if (remaining <= 0) {
      clearInterval(interval)
      onComplete()
    }
  }, 1000)
}

function stop() {
  running = false
  clearInterval(interval)
  btnPlay.textContent = '▶'
  btnPlay.classList.remove('running')
  btnPlay.style.background = MODES[mode].color
  btnPlay.style.color = '#080810'
}

function toggle() {
  if (running) stop()
  else play()
}

// ── COMPLETE ──────────────────────────────────────────
function onComplete() {
  stop()
  playSound(mode === 'focus' ? 'done' : 'start')

  if (mode === 'focus') {
    sessions++
    minutesFocused += MODES.focus.minutes
    streak++
    updateStats()
    updateDots()
    showToast('🎯 Sessão concluída! Hora de descansar.')
    // auto switch to break
    setTimeout(() => setMode(sessions % 4 === 0 ? 'long' : 'short'), 1200)
  } else {
    showToast('⚡ Pausa encerrada. Bora focar!')
    setTimeout(() => setMode('focus'), 1200)
  }
}

// ── RESET ─────────────────────────────────────────────
function reset() {
  stop()
  remaining = totalSecs
  updateDisplay()
}

// ── SKIP ──────────────────────────────────────────────
const MODE_CYCLE = ['focus', 'short', 'long']

function skip() {
  stop()
  const idx = MODE_CYCLE.indexOf(mode)
  const next = MODE_CYCLE[(idx + 1) % MODE_CYCLE.length]
  setMode(next)
}

// ── STATS & DOTS ──────────────────────────────────────
function updateStats() {
  statSess.textContent = sessions
  statMin.textContent  = minutesFocused
  statStr.textContent  = streak
}

function updateDots() {
  dots.forEach((d, i) => {
    d.classList.toggle('filled', i < (sessions % 4) || (sessions % 4 === 0 && sessions > 0 && i < 4))
  })
  // reset dots every 4 sessions
  if (sessions % 4 === 0 && sessions > 0) {
    setTimeout(() => dots.forEach(d => d.classList.remove('filled')), 800)
  }
}

// ── TOAST ─────────────────────────────────────────────
let toastTimer = null
function showToast(msg) {
  toast.textContent = msg
  toast.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200)
}

// ── WEB AUDIO API — SOM SEM ARQUIVO ───────────────────
let audioCtx = null

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  }
  return audioCtx
}

// desbloqueia AudioContext no primeiro clique (política do navegador)
document.addEventListener('click', () => {
  const ctx = getAudioCtx()
  if (ctx.state === 'suspended') ctx.resume()
}, { once: true })

async function playTone(freq, type, duration, gain = 0.2, delay = 0) {
  const ctx = getAudioCtx()
  if (ctx.state === 'suspended') await ctx.resume()
  const osc = ctx.createOscillator()
  const vol = ctx.createGain()
  osc.connect(vol)
  vol.connect(ctx.destination)
  osc.type = type
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay)
  vol.gain.setValueAtTime(0, ctx.currentTime + delay)
  vol.gain.linearRampToValueAtTime(gain, ctx.currentTime + delay + 0.02)
  vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration)
  osc.start(ctx.currentTime + delay)
  osc.stop(ctx.currentTime + delay + duration + 0.05)
}

function playSound(type) {
  if (type === 'done') {
    playTone(523, 'sine', 0.5, 0.22, 0)
    playTone(659, 'sine', 0.5, 0.22, 0.2)
    playTone(784, 'sine', 0.6, 0.25, 0.4)
  } else {
    playTone(440, 'sine', 0.4, 0.2, 0)
    playTone(520, 'sine', 0.35, 0.18, 0.25)
  }
}

// ── EVENTS ───────────────────────────────────────────
btnPlay.addEventListener('click', toggle)
btnReset.addEventListener('click', reset)
btnSkip.addEventListener('click', skip)

modeBar.addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn')
  if (btn) setMode(btn.dataset.mode)
})

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return
  if (e.code === 'Space') { e.preventDefault(); toggle() }
  if (e.code === 'KeyR')  reset()
  if (e.code === 'KeyS')  skip()
})

// ── INIT ──────────────────────────────────────────────
setMode('focus')
updateDisplay()
</script>
</body>
</html>
